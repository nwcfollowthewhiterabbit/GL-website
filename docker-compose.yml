services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - default
      - erp_testing
    restart: unless-stopped

  web:
    build: .
    depends_on:
      - api
    ports:
      - "127.0.0.1:8094:80"
    restart: unless-stopped

networks:
  erp_testing:
    external: true
    name: testingerpgreenleafpacificcom_default
